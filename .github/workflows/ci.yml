name: Go Tests

# Trigger this workflow every time code is pushed to the main branch
# or a Pull Request is opened against the main branch.
on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    name: Run Unit Tests
    # Run this on the latest Ubuntu Linux environment provided by GitHub
    runs-on: ubuntu-latest

    steps:
      # 1. Grab the code from your repository
      - name: Check out code
        uses: actions/checkout@v4

      # 2. Install Go on the GitHub server
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.1" # Match this to the version in your go.mod

      # 3. Download the dependencies (like the Postgres and Redis drivers)
      - name: Install dependencies
        run: go mod download

      # 4. Run the actual tests!
      - name: Run Tests
        run: go test -v ./...
